# ==========================================
# 👑 KEN ENTERPRISE - FRONTEND NGINX CONFIG v1.0
# Mendukung client-side routing (Single Page Application / SPA)
# ==========================================

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # SPA Routing Fallback: Alihkan seluruh request non-file ke index.html
        try_files $uri $uri/ /index.html;
    }

    # Custom Error Pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Cache Control untuk aset statis agar loading ekstra cepat
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip compression untuk optimalisasi bandwidth jaringan
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
