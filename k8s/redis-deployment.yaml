apiVersion: apps/v1
kind: Deployment
metadata:
  name: brewmaster-redis
  namespace: staging
  labels:
    app: brewmaster-redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brewmaster-redis
  template:
    metadata:
      labels:
        app: brewmaster-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: brewmaster-redis
  namespace: staging
spec:
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: brewmaster-redis
