apiVersion: apps/v1
kind: Deployment
metadata:
  name: brewmaster-backend
  namespace: staging
  labels:
    app: brewmaster-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brewmaster-backend
  template:
    metadata:
      labels:
        app: brewmaster-backend
    spec:
      containers:
      - name: api
        image: brewmaster-registry/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: REDIS_HOST
          value: "brewmaster-redis"
        - name: REDIS_PORT
          value: "6379"
        # Gunakan Secrets Manager K8s untuk environment variables sensitif
        envFrom:
        - secretRef:
            name: brewmaster-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /api/system/health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/system/health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: brewmaster-backend
  namespace: staging
spec:
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
  selector:
    app: brewmaster-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brewmaster-backend-hpa
  namespace: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brewmaster-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
